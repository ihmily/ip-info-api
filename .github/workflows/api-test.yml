name: API Test

on:
  schedule:
    - cron: '0 */3 * * *'  # 每3小时
  workflow_dispatch:     # 手动触发
  push:
    branches:
      - main
    paths-ignore:
      - 'output/**'  # 忽略output目录变更
  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          cd test
          pip install -r requirements.txt
      
      - name: Run API tests
        run: |
          cd test
          python test_apis.py -c 32 -v --clear
      
      - name: Update README with API status
        run: |
          python .github/update_readme.py
      
      - name: Commit and push changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add -A
          git diff --staged --quiet || git commit -m "[skip ci] ci: update API test results $(date +'%Y-%m-%d %H:%M')"
          git push
